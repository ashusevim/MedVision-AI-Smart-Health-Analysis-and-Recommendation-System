name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-xdist

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            -n auto \
            --cov=src \
            --cov-report=xml:unit-coverage.xml \
            --cov-report=term-missing

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-${{ matrix.os }}
          path: unit-coverage.xml

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: medvision
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: medvision_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U medvision"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://medvision:test_password@localhost:5432/medvision_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          ENVIRONMENT: test
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=xml:integration-coverage.xml \
            --cov-report=term-missing

      - name: Upload integration test coverage
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: integration-coverage.xml

  medical-data-validation:
    name: Medical Data Validation Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run medical data validation tests
        run: |
          pytest tests/validation/ \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=xml:validation-coverage.xml \
            -k "medical_data"

      - name: Validate DICOM format compliance
        run: |
          pytest tests/validation/test_dicom.py \
            -v \
            --tb=short

      - name: Validate HL7 FHIR compliance
        run: |
          pytest tests/validation/test_fhir.py \
            -v \
            --tb=short

      - name: Upload validation coverage
        uses: actions/upload-artifact@v4
        with:
          name: validation-coverage
          path: validation-coverage.xml

  upload-coverage:
    name: Upload Coverage to Codecov
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, medical-data-validation]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage-artifacts

      - name: Combine coverage reports
        run: |
          pip install coverage
          ls -R coverage-artifacts/
          find coverage-artifacts -name "*.xml" -exec cp {} ./ \;

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./*.xml
          fail_ci_if_error: false
          verbose: true
          flags: unittests,integration,validation
          name: medvision-ai-coverage
