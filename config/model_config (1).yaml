# MedVision-AI Model Configuration
# Defines architectures, hyperparameters, and inference settings for all models.

vision:
  cnn:
    backbone: "resnet50"
    pretrained: true
    freeze_backbone: false
    output_dim: 2048
    pooling: "adaptive_avg"
    dropout: 0.3
  vit:
    model_name: "google/vit-base-patch16-224-in21k"
    patch_size: 16
    image_size: 224
    num_channels: 3
    hidden_size: 768
    num_hidden_layers: 12
    num_attention_heads: 12
    intermediate_size: 3072
    feature_dim: 768
    dropout: 0.1
    attention_dropout: 0.1
  preprocessing:
    image_size: 224
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]
    resize_method: "bilinear"
    center_crop: true

text:
  bert:
    model_name: "emilyalsentzer/Bio_ClinicalBERT"
    pretrained: true
    max_length: 512
    hidden_dim: 768
    num_hidden_layers: 12
    num_attention_heads: 12
    intermediate_size: 3072
    vocab_size: 28996
    type_vocab_size: 2
    dropout: 0.1
    attention_dropout: 0.1
  tokenizer:
    name: "emilyalsentzer/Bio_ClinicalBERT"
    do_lower_case: true
    truncation: true
    padding: "max_length"
    max_length: 512
    return_attention_mask: true
    return_token_type_ids: true
  symptom_ner:
    enabled: true
    model_type: "bert-crf"
    labels:
      - "O"
      - "B-SYMPTOM"
      - "I-SYMPTOM"
      - "B-CONDITION"
      - "I-CONDITION"
      - "B-SEVERITY"
      - "I-SEVERITY"
      - "B-DURATION"
      - "I-DURATION"

multimodal:
  fusion_transformer:
    num_layers: 6
    num_heads: 12
    hidden_dim: 768
    intermediate_dim: 3072
    dropout: 0.1
    attention_dropout: 0.1
    layer_norm_eps: 1.0e-6
    activation: "gelu"
    fusion_strategy: "cross_attention"
  projection:
    vision_proj_dim: 768
    text_proj_dim: 768
    shared_dim: 768
    projection_type: "linear"
    normalize: true
  alignment:
    temperature: 0.07
    loss: "contrastive"
    margin: 0.2

risk:
  num_risk_classes: 5
  class_names:
    - "very_low"
    - "low"
    - "moderate"
    - "high"
    - "very_high"
  threshold: 0.5
  calibration:
    enabled: true
    method: "temperature_scaling"
    temperature: 1.0
  scoring:
    weights:
      image_features: 0.4
      text_features: 0.3
      clinical_metadata: 0.2
      patient_history: 0.1
  uncertainty:
    enabled: true
    method: "monte_carlo_dropout"
    num_samples: 30
    confidence_interval: 0.95

recommendation:
  top_k: 5
  diversity_weight: 0.3
  relevance_weight: 0.5
  novelty_weight: 0.2
  temperature: 1.0
  reranking:
    enabled: true
    method: "mmr"  # Maximal Marginal Relevance
    lambda: 0.7
  filtering:
    exclude_contraindicated: true
    verify_guidelines: true
    guideline_source: "who_icd11"
  explanation:
    enabled: true
    method: "attention_weights"
    max_explanation_length: 256

checkpoint:
  save_dir: "checkpoints"
  save_best: true
  monitor: "val/auc"
  mode: "max"
  save_top_k: 3
  save_last: true
  filename: "medvision-{epoch:03d}-{val/auc:.4f}"

compile:
  enabled: false
  backend: "inductor"
  mode: "default"
