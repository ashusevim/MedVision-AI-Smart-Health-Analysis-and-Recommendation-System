# MedVision-AI Base Configuration
# This is the base configuration file that all environments inherit from.
# Override settings in environment-specific config files (dev_config.yaml, prod_config.yaml).

project:
  name: "MedVision-AI"
  version: "1.0.0"
  description: "Multimodal Medical AI for Image Analysis, Symptom NLP, Risk Scoring, and Treatment Recommendations"

logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  handlers:
    console:
      enabled: true
      level: "INFO"
      stream: "stdout"
    file:
      enabled: true
      level: "DEBUG"
      filename: "logs/medvision.log"
      max_bytes: 10485760  # 10 MB
      backup_count: 5
      rotation: "size"
    error_file:
      enabled: true
      level: "ERROR"
      filename: "logs/medvision_error.log"
      max_bytes: 10485760
      backup_count: 10

database:
  url: "sqlite:///data/medvision.db"
  pool_size: 10
  max_overflow: 20
  pool_timeout: 30
  pool_recycle: 3600
  echo: false

redis:
  host: "localhost"
  port: 6379
  db: 0
  ttl: 3600
  password: null
  max_connections: 50
  socket_timeout: 5
  socket_connect_timeout: 5

api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  timeout: 120
  keep_alive: 5
  max_request_size: 52428800  # 50 MB for medical images

security:
  secret_key: "${SECRET_KEY}"
  algorithm: "HS256"
  access_token_expire_minutes: 30
  refresh_token_expire_days: 7
  allowed_hosts:
    - "localhost"
    - "127.0.0.1"
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8000"

general:
  seed: 42
  device: "cpu"
  num_workers: 4
  deterministic: true
  benchmark: false
