# =============================================================================
# MedVision-AI - Project Configuration
# =============================================================================

[build-system]
requires = ["setuptools>=68.0", "wheel>=0.42.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "medvision-ai"
version = "0.1.0"
description = "Multimodal medical image analysis, symptom NLP, risk scoring, and treatment recommendation platform"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.11"
authors = [
    {name = "MedVision-AI Team", email = "team@medvision-ai.dev"},
]
maintainers = [
    {name = "MedVision-AI Team", email = "team@medvision-ai.dev"},
]
keywords = [
    "medical-imaging",
    "deep-learning",
    "clinical-decision-support",
    "nlp",
    "risk-scoring",
    "treatment-recommendation",
    "multimodal",
    "radiology",
    "pathology",
    "healthcare-ai",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Healthcare Industry",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

dependencies = [
    "torch>=2.1.0",
    "torchvision>=0.16.0",
    "transformers>=4.35.0",
    "timm>=0.9.0",
    "monai>=1.3.0",
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "pydantic>=2.5.0",
    "python-multipart>=0.0.6",
    "opencv-python>=4.8.0",
    "Pillow>=10.0.0",
    "scikit-learn>=1.3.0",
    "pandas>=2.1.0",
    "numpy>=1.26.0",
    "scipy>=1.11.0",
    "matplotlib>=3.8.0",
    "seaborn>=0.13.0",
    "mlflow>=2.9.0",
    "streamlit>=1.29.0",
    "gradio>=4.8.0",
    "redis>=5.0.0",
    "sqlalchemy>=2.0.0",
    "alembic>=1.13.0",
    "pyyaml>=6.0.1",
    "python-dotenv>=1.0.0",
    "httpx>=0.25.0",
    "cryptography>=41.0.0",
    "python-jose[cryptography]>=3.3.0",
    "passlib[bcrypt]>=1.7.4",
    "pydicom>=2.4.0",
    "structlog>=23.2.0",
    "rich>=13.7.0",
    "click>=8.1.0",
    "tenacity>=8.2.0",
    "tqdm>=4.66.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.12.0",
    "ruff>=0.1.0",
    "mypy>=1.7.0",
    "black>=23.11.0",
    "isort>=5.12.0",
    "pre-commit>=3.6.0",
    "types-pyyaml>=6.0.12",
    "types-redis>=4.6.0",
    "pandas-stubs>=2.1.0",
    "factory-boy>=3.3.0",
    "faker>=20.0.0",
    "httpx>=0.25.0",
]

docs = [
    "mkdocs>=1.5.0",
    "mkdocs-material>=9.5.0",
    "mkdocstrings[python]>=0.24.0",
    "mkdocs-gen-files>=0.5.0",
    "mkdocs-literate-nav>=0.6.0",
    "mkdocs-section-index>=0.3.8",
]

test = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.12.0",
    "pytest-xdist>=3.5.0",
    "pytest-timeout>=2.2.0",
    "factory-boy>=3.3.0",
    "faker>=20.0.0",
    "httpx>=0.25.0",
    "coverage[toml]>=7.3.0",
]

gpu = [
    "torch>=2.1.0",
    "torchvision>=0.16.0",
    "onnxruntime-gpu>=1.16.0",
    "cupy-cuda12x>=12.0.0",
]

onnx = [
    "onnx>=1.15.0",
    "onnxruntime>=1.16.0",
]

all = [
    "medvision-ai[dev,docs,test,gpu,onnx]",
]

[project.urls]
Homepage = "https://github.com/medvision-ai/medvision-ai"
Documentation = "https://medvision-ai.readthedocs.io"
Repository = "https://github.com/medvision-ai/medvision-ai"
Issues = "https://github.com/medvision-ai/medvision-ai/issues"
Changelog = "https://github.com/medvision-ai/medvision-ai/blob/main/CHANGELOG.md"
Downloads = "https://pypi.org/project/medvision-ai/"

[project.scripts]
medvision = "medvision_ai.cli:main"
medvision-train = "medvision_ai.scripts.train:main"
medvision-serve = "medvision_ai.scripts.serve:main"

# =============================================================================
# Setuptools Configuration
# =============================================================================
[tool.setuptools]
packages = {find = {where = ["."], include = ["medvision_ai*"]}}
zip-safe = false
include-package-data = true

[tool.setuptools.package-data]
medvision_ai = ["py.typed", "configs/*.yaml"]

# =============================================================================
# Ruff Configuration
# =============================================================================
[tool.ruff]
target-version = "py311"
line-length = 88
src = ["medvision_ai", "tests"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "A",    # flake8-builtins
    "C4",   # flake8-comprehensions
    "DTZ",  # flake8-datetimez
    "EM",   # flake8-errmsg
    "EXE",  # flake8-executable
    "ISC",  # flake8-implicit-str-concat
    "ICN",  # flake8-import-conventions
    "LOG",  # flake8-logging
    "G",    # flake8-logging-format
    "PIE",  # flake8-pie
    "PYI",  # flake8-pyi
    "PT",   # flake8-pytest-style
    "Q",    # flake8-quotes
    "RSE",  # flake8-raise
    "RET",  # flake8-return
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
    "ARG",  # flake8-unused-arguments
    "PTH",  # flake8-use-pathlib
    "ERA",  # eradicate
    "PD",   # pandas-vet
    "PGH",  # pygrep-hooks
    "PL",   # pylint
    "TRY",  # tryceratops
    "FURB", # refurb
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",    # line too long (handled by black)
    "PLR0913", # too many arguments
    "PLR2004", # magic value comparison
    "TRY003",  # avoid specifying long messages outside the exception class
    "ISC001",  # conflicting with formatter
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*" = ["ARG", "PD", "PLR2004", "S101"]
"__init__.py" = ["F401"]
"scripts/**/*" = ["T201"]  # allow print in scripts

[tool.ruff.lint.isort]
known-first-party = ["medvision_ai"]
force-single-line = false
lines-after-imports = 2
combine-as-imports = true

[tool.ruff.lint.pylint]
max-args = 7
max-branches = 12
max-returns = 6
max-statements = 50

[tool.ruff.lint.flake8-pytest-style]
fixture-parentheses = false
mark-parentheses = false
parametrize-names-type = "csv"

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
docstring-code-format = true

# =============================================================================
# Mypy Configuration
# =============================================================================
[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
follow_imports = "normal"
strict_optional = true
show_error_codes = true
show_column_numbers = true
show_error_context = true
pretty = true

[[tool.mypy.overrides]]
module = [
    "monai.*",
    "timm.*",
    "cv2.*",
    "dicom2nifti.*",
    "pydicom.*",
    "nibabel.*",
    "albumentations.*",
    "mlflow.*",
    "gradio.*",
    "streamlit.*",
    "xgboost.*",
    "lightgbm.*",
    "structlog.*",
    "redis.*",
    "jose.*",
    "passlib.*",
    "alembic.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
disallow_incomplete_defs = false

# =============================================================================
# Pytest Configuration
# =============================================================================
[tool.pytest.ini_options]
minversion = "7.4"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--tb=short",
    "--disable-warnings",
    "-ra",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests that require external services",
    "gpu: marks tests that require GPU",
    "model: marks tests that load ML models",
    "e2e: marks end-to-end tests",
]
asyncio_mode = "auto"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::UserWarning:torch.*",
    "ignore::FutureWarning:pandas.*",
]
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

# =============================================================================
# Coverage Configuration
# =============================================================================
[tool.coverage.run]
source = ["medvision_ai"]
omit = [
    "tests/*",
    "*/__pycache__/*",
    "*/migrations/*",
    "medvision_ai/dashboard/*",
    "medvision_ai/playground/*",
]
branch = true
parallel = true

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
    "@overload",
]
fail_under = 80

[tool.coverage.html]
directory = "htmlcov"

[tool.coverage.xml]
output = "coverage.xml"

# =============================================================================
# Black Configuration
# =============================================================================
[tool.black]
target-version = ["py311"]
line-length = 88
skip-string-normalization = false
skip-magic-trailing-comma = false
preview = true

# =============================================================================
# Isort Configuration
# =============================================================================
[tool.isort]
profile = "black"
known_first_party = ["medvision_ai"]
line_length = 88
force_single_line = false
combine_as_imports = true
lines_after_imports = 2

# =============================================================================
# Bandit Configuration
# =============================================================================
[tool.bandit]
targets = ["medvision_ai"]
exclude_dirs = ["tests", "migrations"]
skips = ["B101", "B601"]
